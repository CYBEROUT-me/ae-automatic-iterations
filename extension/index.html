<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src https://api.github.com https://github.com https://*.githubusercontent.com https://uploads.github.com;"/>
<title>AE Iterations</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="update-banner" class="hidden">
  <span>Update <strong id="update-version"></strong> available</span>
  <button id="btn-update">Install</button>
</div>

<div id="layer-section">
  <div id="layer-info">No layer selected</div>
  <button id="btn-refresh">Refresh Layer</button>
</div>

<div id="same-all-section" class="hidden">
  <label><input type="checkbox" id="same-for-all" checked/> Same value for all layers</label>
</div>

<div id="change-type-section">
  <label>Change type:</label>
  <select id="change-type">
    <option value="shapeColor">Shape Color</option>
    <option value="textColor">Text Color</option>
    <option value="textFont">Text Font</option>
  </select>
</div>

<div id="font-search-section" class="hidden">
  <input type="text" id="font-search" placeholder="Search font…" autocomplete="off"/>
  <div id="font-dropdown" class="hidden"></div>
</div>

<div id="preset-section">
  <button id="btn-presets">Presets</button>
  <div id="preset-panel" class="hidden">
    <div id="preset-save-row">
      <input type="text" id="preset-name-input" placeholder="Palette name…" maxlength="30"/>
      <button id="btn-save-preset">Save</button>
    </div>
    <div id="preset-list"></div>
  </div>
</div>

<div id="iterations-section">
  <div class="iter-header">
    <span class="col-iter">Iter</span>
    <span class="col-value" id="col-value-label">Color</span>
  </div>

  <div class="iter-row" data-i="0">
    <span class="iter-num">1</span>
    <div class="color-cell">
      <input type="color" class="color-pick" value="#ff0000"/>
      <input type="text"  class="hex-input"  value="#FF0000" maxlength="7"/>
    </div>
    <input type="text" class="font-input hidden" placeholder="Font (PostScript name)"/>
    <button class="sample-btn" data-row="0" title="Capture current AE values into this row">&#8592;</button>
  </div>

  <div class="iter-row" data-i="1">
    <span class="iter-num">2</span>
    <div class="color-cell">
      <input type="color" class="color-pick" value="#00ff00"/>
      <input type="text"  class="hex-input"  value="#00FF00" maxlength="7"/>
    </div>
    <input type="text" class="font-input hidden" placeholder="Font (PostScript name)"/>
    <button class="sample-btn" data-row="1" title="Capture current AE values into this row">&#8592;</button>
  </div>

  <div class="iter-row" data-i="2">
    <span class="iter-num">3</span>
    <div class="color-cell">
      <input type="color" class="color-pick" value="#0000ff"/>
      <input type="text"  class="hex-input"  value="#0000FF" maxlength="7"/>
    </div>
    <input type="text" class="font-input hidden" placeholder="Font (PostScript name)"/>
    <button class="sample-btn" data-row="2" title="Capture current AE values into this row">&#8592;</button>
  </div>

  <div class="iter-row" data-i="3">
    <span class="iter-num">4</span>
    <div class="color-cell">
      <input type="color" class="color-pick" value="#ffff00"/>
      <input type="text"  class="hex-input"  value="#FFFF00" maxlength="7"/>
    </div>
    <input type="text" class="font-input hidden" placeholder="Font (PostScript name)"/>
    <button class="sample-btn" data-row="3" title="Capture current AE values into this row">&#8592;</button>
  </div>

  <div class="iter-row" data-i="4">
    <span class="iter-num">5</span>
    <div class="color-cell">
      <input type="color" class="color-pick" value="#ff00ff"/>
      <input type="text"  class="hex-input"  value="#FF00FF" maxlength="7"/>
    </div>
    <input type="text" class="font-input hidden" placeholder="Font (PostScript name)"/>
    <button class="sample-btn" data-row="4" title="Capture current AE values into this row">&#8592;</button>
  </div>
</div>

<div id="extra-layers-section"></div>

<div id="run-section">
  <div id="btn-row">
    <button id="btn-test" disabled>Test Apply</button>
    <button id="btn-run" disabled>Run Iterations</button>
  </div>
  <div id="status"></div>
  <pre id="debug-log" class="hidden"></pre>
</div>

<script src="js/CSInterface.js"></script>
<script src="js/version.js"></script>
<script src="js/main.js"></script>
</body>
</html>
